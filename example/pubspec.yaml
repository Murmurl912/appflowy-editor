name: example
description: A simple markdown editor built with AppFlowy Editor.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  appflowy_editor:
    path: ../
  path_provider: ^2.0.15
  file_picker: ^10.3.10
  google_fonts: ^6.1.0
  universal_platform: ^1.1.0
  path: ^1.9.0
  provider: ^6.0.3
  flutter_math_fork: ^0.7.3
  markdown: ^7.2.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  video_player: ^2.9.3
  flutter_inappwebview: ^6.1.5
  ffi: ^2.1.4
  flutter_svg: ^2.0.10+1
  highlight: ^0.7.0

dependency_overrides:
  appflowy_editor:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  native_toolchain_rust: ^1.0.3
  native_assets_cli: ^0.12.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/web/
    - assets/web/dist/
    - assets/web/dist/css/
    - assets/web/dist/css/content-theme/
    - assets/web/dist/images/
    - assets/web/dist/images/emoji/
    - assets/web/dist/js/
    - assets/web/dist/js/highlight.js/
    - assets/web/dist/js/highlight.js/styles/
    - assets/web/dist/js/highlight.js/styles/base16/
    - assets/web/dist/js/i18n/
    - assets/web/dist/js/icons/
    - assets/web/dist/js/katex/
    - assets/web/dist/js/katex/fonts/
    - assets/web/dist/js/lute/
    - assets/web/dist/js/mermaid/
